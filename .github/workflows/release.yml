name: Release & Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify CHANGELOG updated
        run: |
          if ! grep -q "## \[$(echo ${{ github.ref }} | sed 's/refs\/tags\///g')\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md not updated for this version"
            exit 1
          fi
          echo "✅ CHANGELOG.md is up to date"
      
      - name: Verify version consistency
        run: |
          VERSION=$(echo ${{ github.ref }} | sed 's/refs\/tags\///g')
          echo "✅ Version: $VERSION"

  frontend-build:
    name: Frontend - Build & Release
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run tests
        working-directory: ./frontend
        run: npm run test:ci
      
      - name: Build application
        working-directory: ./frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist

  backend-build:
    name: Backend - Build & Publish
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run tests
        working-directory: ./backend
        run: npm run test:ci
      
      - name: Build application
        working-directory: ./backend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: backend/dist

  telemetry-build:
    name: Telemetry Bridge - Build & Publish
    runs-on: windows-latest
    needs: validate
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        working-directory: ./telemetry-bridge
        run: dotnet restore
      
      - name: Run tests
        working-directory: ./telemetry-bridge
        run: dotnet test --configuration Release
      
      - name: Publish release
        working-directory: ./telemetry-bridge
        run: dotnet publish -c Release -o ./release
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: telemetry-bridge-release
          path: telemetry-bridge/release

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, telemetry-build]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Create Release Notes
        run: |
          VERSION=$(echo ${{ github.ref }} | sed 's/refs\/tags\///g')
          NOTES=$(sed -n "/## \[${VERSION:1}\]/,/## \[/p" CHANGELOG.md | head -n -1)
        
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: PitWall ${{ github.ref }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
      
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            frontend-build/**/*
            backend-build/**/*
            telemetry-bridge-release/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
